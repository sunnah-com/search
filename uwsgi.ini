[uwsgi]
module = main:app
socket = 0.0.0.0:5002
master = true
processes = 4
threads = 8
enable-threads = true
harakiri = 35
harakiri-verbose = true
buffer-size=32768
#log-x-forwarded-for = true
#log-format = [pid: %(pid)|app: %(wid)|req: %(reqnum)/%(requests)] %(addr) %(method) %(uri) => generated %(size) bytes in %(msecs) msecs (%(proto) %(status))
#disable-logging = true
# /index rebuilds take minutes; bump harakiri for that route only.
route = ^/index harakiri:1800

