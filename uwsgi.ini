[uwsgi]
module = main:app
socket = 0.0.0.0:5002
master = true
processes = 4
threads = 8
enable-threads = true
harakiri = 35
harakiri-verbose = true
buffer-size=32768
# /index performs remote embedding for ~48K docs before bulk-ingest, which
# takes several minutes. Override the 35s harakiri just for this admin route
# so a real rebuild can complete; search endpoints keep the strict 35s limit.
route = ^/index harakiri:1800

