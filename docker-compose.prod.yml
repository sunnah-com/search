version: '3'

services:
  web:
    depends_on:
      - "elasticsearch"
    build:
      context: .
      dockerfile: Dockerfile-prod
    command: uwsgi --ini uwsgi.ini
    ports:
      - "7650:5002"
    restart: on-failure
    env_file:
      - .env
    # Bypass Docker's embedded DNS for the ES hostname — at high RPS the
    # resolver becomes a bottleneck and returns EAI_AGAIN. /etc/hosts is
    # consulted before DNS, so every lookup is instant.
    extra_hosts:
      - "elasticsearch:172.31.250.10"
      # host.docker.internal resolves automatically on Docker Desktop (Mac/Windows)
      # but not on Linux. host-gateway is Docker's built-in alias for the host's
      # IP on the bridge network, making host.docker.internal work on Linux too.
      # This is what lets the container reach Ollama running on the host.
      - "host.docker.internal:host-gateway"
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_STACK_VERSION}
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=-Xms600m -Xmx1g"
    volumes:
      - ./config/synonyms.txt:/usr/share/elasticsearch/config/synonyms.txt
      - es-data:/usr/share/elasticsearch/data
      - es-logs:/usr/share/elasticsearch/logs
    env_file:
      - .env
    networks:
      default:
        ipv4_address: 172.31.250.10
  es-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.7.0
    restart: unless-stopped
    command:
      - '--es.uri=http://elasticsearch:9200'
      - '--es.all'
      - '--es.indices'
    environment:
      - ES_USERNAME=elastic
      - ES_PASSWORD=${ELASTIC_PASSWORD}
    mem_limit: 64m
    depends_on:
      - elasticsearch
  alloy:
    image: grafana/alloy:v1.4.2
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - es-logs:/es-logs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - GC_LOKI_URL=${GC_LOKI_URL}
      - GC_LOKI_USER=${GC_LOKI_USER}
      - GC_LOKI_PASSWORD=${GC_LOKI_PASSWORD}
      - GC_PROM_URL=${GC_PROM_URL}
      - GC_PROM_USER=${GC_PROM_USER}
      - GC_PROM_PASSWORD=${GC_PROM_PASSWORD}
      - DEPLOY_ENV=${DEPLOY_ENV:-prod}

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.250.0/24

volumes:
  es-logs:
  es-data:

